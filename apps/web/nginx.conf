events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # DNS resolver for dynamic service discovery
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Upstream for API service
    upstream api_backend {
        server api:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ===== API PROXY =====
        # Must come BEFORE the catch-all / location
        location /api/ {
            proxy_pass http://api_backend;

            # HTTP version and connection handling
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering off;

            # Disable redirect rewrites
            proxy_redirect off;
        }

        # ===== WEBSOCKET PROXY =====
        location /socket.io/ {
            proxy_pass http://api_backend;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ===== STATIC FILES WITH LONG CACHING =====
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webm|mp3)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ===== PWA MANIFEST =====
        location /manifest.webmanifest {
            expires 1y;
            add_header Cache-Control "public";
        }

        # ===== SERVICE WORKER =====
        location /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ===== SOUND FILES =====
        location /sounds/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        # ===== HEALTH CHECK =====
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ===== SPA FALLBACK - MUST BE LAST =====
        # Serves index.html for all unmatched routes (SPA routing)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
