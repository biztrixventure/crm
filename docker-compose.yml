version: '3.9'

services:
  api:
    build: ./apps/api
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
      - NODE_ENV=${NODE_ENV:-production}
      - FRONTEND_URL=${FRONTEND_URL}
      - REDIS_URL=redis://redis:6379
      - TOTP_ISSUER=${TOTP_ISSUER:-BizTrixVenture}
    expose:
      - "4000"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - biztrix-network

  web:
    build: ./apps/web
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - "coolify.managed=true"
    networks:
      - biztrix-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - biztrix-network

  worker:
    build: ./apps/worker
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:4000
    depends_on:
      - redis
      - api
    restart: unless-stopped
    networks:
      - biztrix-network

volumes:
  redis_data:
    driver: local

networks:
  biztrix-network:
    driver: bridge
