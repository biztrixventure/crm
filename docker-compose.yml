version: '3.9'

services:
  api:
    build: ./apps/api
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biztrix-network

  web:
    build: ./apps/web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - biztrix-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - biztrix-network

  worker:
    build: ./apps/worker
    env_file: .env
    depends_on:
      - redis
      - api
    restart: unless-stopped
    networks:
      - biztrix-network

volumes:
  redis_data:

networks:
  biztrix-network:
    driver: bridge
